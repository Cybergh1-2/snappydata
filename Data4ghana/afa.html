<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFA Registration</title>

<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/afa.css">

</head>

<body>

<button class="menu-btn" onclick="openMenu()">☰</button>

<div id="menu-container"></div>

<div class="container">

<h2>📄 AFA Registration</h2>
<p class="subtitle">Manage your AFA services</p>

<!-- OPTIONS -->

<div class="afa-options">

<button class="premium" onclick="openPremium()">
Premium (€30)
</button>
<!-- PREMIUM MODAL -->

<div id="premiumModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closePremium()">&times;</span>

<h2>AFA Registration</h2>

<form id="afaForm">

<label>Full Name *</label>
<input type="text" required placeholder="Enter your full name">

<label>Phone Number *</label>
<input type="text" required placeholder="Enter your phone number">

<label>ID Type *</label>
<select required>
<option value="">Select ID Type</option>
<option>Ghana Card</option>
<option>Passport</option>
<option>Driver License</option>
<option>Voter ID</option>
</select>

<label>ID Number *</label>
<input type="text" required placeholder="Enter your ID number">

<label>ID Front Photo *</label>
<input type="file" required>

<label>ID Back Photo *</label>
<input type="file" required>

<label>Selfie / Profile Picture *</label>
<input type="file" required>

<div class="modal-buttons">

<button type="button" class="cancel-btn" onclick="closePremium()">
Cancel
</button>

<button type="submit" class="pay-btn">
Pay & Register
</button>

</div>

</form>

</div>

</div>

<button class="normal" onclick="openNormal()">
Normal (€25)
</button>
<!-- NORMAL MODAL -->

<div id="normalModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeNormal()">&times;</span>

<h2>AFA Registration</h2>

<form id="normalForm">

<label>Full Name *</label>
<input type="text" placeholder="Enter your full name" required>

<label>Phone Number *</label>
<input type="text" placeholder="Enter your phone number" required>

<label>ID Type *</label>
<select required>
<option value="">-- Select ID Type --</option>
<option>Ghana Card</option>
<option>Passport</option>
<option>Driver License</option>
<option>Voter ID</option>
</select>

<label>ID Number *</label>
<input type="text" placeholder="Enter your ID number" required>

<div class="modal-buttons">

<button type="button" class="cancel-btn" onclick="closeNormal()">
Cancel
</button>

<button type="submit" class="pay-btn">
Pay & Register
</button>

</div>

</form>

</div>

</div>

</div>

<div class="option-text">

<p>⬆ Register AFA without pictures upload</p>
<p>⬆ Register AFA with pictures upload</p>

</div>

<!-- FILTERS -->

<div class="filters">

<div>

<label>Time</label>

<select>
<option>All Time</option>
<option>Today</option>
<option>This Week</option>
<option>This Month</option>
</select>

</div>

<div>

<label>Search Phone</label>

<input type="text" placeholder="Enter phone">

</div>

</div>

<button class="export-btn">Export CSV</button>

<!-- EMPTY STATE -->

<div class="empty-box">

<h3>No registrations found</h3>
<p>We couldn't find any registrations to display.</p>

</div>

</div>

<script src="jss/menu.js"></script>

<script>
function openPremium() {
  document.getElementById("premiumModal").style.display = "block";
}

function closePremium() {
  document.getElementById("premiumModal").style.display = "none";
}

function openNormal() {
  document.getElementById("normalModal").style.display = "block";
}

function closeNormal() {
  document.getElementById("normalModal").style.display = "none";
}

document.getElementById("afaForm").addEventListener("submit", function(e){
  e.preventDefault();

  let price = 30;

  if(walletBalance < price){
    alert("Insufficient wallet balance. Please fund your wallet.");
    return;
  }

  walletBalance -= price;
  alert("Registration successful! Wallet charged €30");
  saveAFA("Premium");
  closePremium();
});

document.getElementById("normalForm").addEventListener("submit", function(e){
  e.preventDefault();

  let price = 25;

  if(walletBalance < price){
    alert("Insufficient wallet balance. Please fund your wallet.");
    return;
  }

  walletBalance -= price;
  alert("Registration successful! Wallet charged €25");
  saveAFA("Normal");
  closeNormal();
});
</script>

</body>
</html>
